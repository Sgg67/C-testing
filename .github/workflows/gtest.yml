name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: install gtest
      run: |
        sudo apt update
        sudo apt install libgtest-dev cmake build-essential -y
      
    - name: make gtest
      run: |
        cd /usr/src/gtest
        sudo cmake .
        sudo make
        sudo cp lib/*.a /usr/lib
        
    - name: make tests
     run: |
       cd ~/Cprojects/test_project
       mkdir -p build
       cd build
       cmake ..
       make

    - name: run tests
      run: ./test_runner
    
     
