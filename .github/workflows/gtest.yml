name: gtest

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v3
    - name: install gtest
      run: |
        sudo apt update
        sudo apt install libgtest-dev cmake build-essential -y
      
    - name: make gtest
      run: |
        cd /usr/src/gtest
        sudo cmake .
        sudo make
        sudo cp lib/*.a /usr/lib
        
    - name: make tests
      run: |
       mkdir -p build
       cd build
       cmake ..
       make

    - name: run tests
      run: ./build/test_runner
    
     
